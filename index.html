<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Padel Pole Watch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
  --bg:#0f172a;
  --panel:#111827;
  --accent:#ef4444;
  --green:#22c55e;
  --orange:#f59e0b;
  --red:#ef4444;
  --text:#f3f4f6;
  --muted:#9ca3af;
}

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

#sidebar {
  width:320px;
  background:var(--panel);
  padding:30px 25px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  gap:25px;
  box-shadow:4px 0 20px rgba(0,0,0,0.3);
}

.logo {
  font-size:20px;
  font-weight:600;
  letter-spacing:0.5px;
}

.stats {
  display:flex;
  flex-direction:column;
  gap:12px;
}

.stat {
  display:flex;
  justify-content:space-between;
  padding:10px 12px;
  border-radius:8px;
  background:#1f2937;
  font-size:14px;
}

.badge {
  font-weight:600;
}

.filters label {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
  cursor:pointer;
  font-size:14px;
}

input[type="checkbox"] {
  accent-color:var(--accent);
}

#map {
  flex:1;
}

#searchBox {
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
}

#searchInput {
  width:340px;
  padding:12px 15px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;
  background:#1f2937;
  color:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#searchInput::placeholder {
  color:var(--muted);
}

.leaflet-popup-content-wrapper {
  border-radius:12px;
}
</style>
</head>

<body>

<div id="sidebar">
  <div class="logo">🏓 Padel Pole Watch</div>

  <div class="stats">
    <div class="stat">Total <span id="totalCount" class="badge">0</span></div>
    <div class="stat">🟢 Safe <span id="greenCount" class="badge">0</span></div>
    <div class="stat">🟠 Moyen <span id="orangeCount" class="badge">0</span></div>
    <div class="stat">🔴 Dangereux <span id="redCount" class="badge">0</span></div>
  </div>

  <div class="filters">
    <strong>Filtres</strong>
    <label><input type="checkbox" id="filterGreen" checked> 🟢 Safe</label>
    <label><input type="checkbox" id="filterOrange" checked> 🟠 Moyen</label>
    <label><input type="checkbox" id="filterRed" checked> 🔴 Dangereux</label>
  </div>
</div>

<div id="map"></div>

<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Rechercher un club ou une adresse...">
</div>

<script>
var map = L.map('map').setView([46.6, 2.4], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19
}).addTo(map);

let markers = [];

function loadMarkers() {

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vS_hj7_w7FAra9Ko-QV3XrOFChkNLfpGAACMs5Jlj-ljpPakGQrlQW3Jd-zvq8mCJ3vEqz6Cva4oLQ5/pub?output=tsv")
    .then(res => res.text())
    .then(text => {

      const rows = text.trim().split("\n");
      rows.shift();

      let total=0, green=0, orange=0, red=0;

      rows.forEach(row => {

        const cols = row.split("\t");

        const club = cols[1];
        const address = cols[2];
        const lat = parseFloat(cols[3]);
        const lon = parseFloat(cols[4]);
        const danger = cols[6];

        if (!lat || !lon) return;

        total++;

        let color="red";
        red++;

        if (danger.includes("🟢")) { color="green"; green++; red--; }
        if (danger.includes("🟠")) { color="orange"; orange++; red--; }

        if (
          (color==="green" && !filterGreen.checked) ||
          (color==="orange" && !filterOrange.checked) ||
          (color==="red" && !filterRed.checked)
        ) return;

        const marker = L.circleMarker([lat,lon],{
          radius:9,
          color:color,
          fillColor:color,
          fillOpacity:0.85
        })
        .addTo(map)
        .bindPopup(`
          <strong>${club}</strong><br>
          <small>${address}</small><br><br>
          <b>${danger}</b>
        `);

        markers.push(marker);

      });

      totalCount.textContent=total;
      greenCount.textContent=green;
      orangeCount.textContent=orange;
      redCount.textContent=red;

    });
}

loadMarkers();

filterGreen.onchange=loadMarkers;
filterOrange.onchange=loadMarkers;
filterRed.onchange=loadMarkers;

searchInput.addEventListener("input", function(){

  const query=this.value.trim();
  if(query.length<3) return;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`)
    .then(res=>res.json())
    .then(data=>{
      if(!data.length) return;
      map.setView([data[0].lat,data[0].lon],16);
    });

});
</script>

</body>
</html>
