<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Padel Pole Watch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#0b1220; --panel:#0f1730; --stroke:rgba(255,255,255,.10);
      --txt:#eef2ff; --muted:#a8b3cf;
      --green:#22c55e; --orange:#f59e0b; --red:#ef4444;
      --shadow2: 0 10px 30px rgba(0,0,0,.35);
      --r12:12px; --r16:16px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{ margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--txt); overflow:hidden; }
    .app{ height:100vh; display:grid; grid-template-columns: 380px 1fr; }

    .sidebar{
      background:linear-gradient(180deg, var(--panel), rgba(15,23,48,.92));
      border-right:1px solid var(--stroke);
      padding:18px;
      display:flex; flex-direction:column; gap:14px;
      box-shadow: 8px 0 35px rgba(0,0,0,.35);
      overflow:auto;
    }
    .brand{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px; border:1px solid var(--stroke); background:rgba(255,255,255,.03);
      border-radius: var(--r16); box-shadow: var(--shadow2);
    }
    .brand h1{ margin:0; font-size:16px; }
    .brand .tag{ font-size:12px; color:var(--muted); margin-top:2px; }

    .card{
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.03);
      border-radius: var(--r16);
      padding:12px;
      box-shadow: var(--shadow2);
    }
    .row{ display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; }

    .stats{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px; }
    .statBox{ border:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.18); border-radius: var(--r12); padding:10px; }
    .statBox .label{ font-size:12px; color:var(--muted); margin-bottom:4px; }
    .statBox .value{ font-size:22px; font-weight:900; }

    .filters{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
    .check{ display:flex; align-items:center; gap:10px; font-size:13px; cursor:pointer; user-select:none; }
    .check input{ width:16px; height:16px; accent-color: var(--red); cursor:pointer; }

    .btn{
      border:0; cursor:pointer; padding:12px 12px; border-radius: var(--r12);
      font-weight:900; color:#fff; background: var(--red);
      box-shadow: 0 12px 28px rgba(239,68,68,.22);
    }
    .btn.secondary{
      background: rgba(255,255,255,.10);
      color: var(--txt);
      box-shadow:none;
      font-weight:800;
    }
    .btn.secondary:hover{ background: rgba(255,255,255,.14); }

    .searchWrap{ display:flex; flex-direction:column; gap:10px; }
    .searchInput{
      width:100%; padding:12px; border-radius: var(--r12);
      border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.20);
      color:var(--txt); outline:none; font-size:14px;
    }
    .searchInput::placeholder{ color:rgba(168,179,207,.85); }
    .hint{ font-size:12px; color:var(--muted); line-height:1.35; }

    .results{
      display:none;
      overflow:hidden;
      border-radius: var(--r12);
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
    }
    .resultBtn{
      width:100%;
      text-align:left;
      border:0;
      background:transparent;
      color:var(--txt);
      padding:10px 10px;
      cursor:pointer;
      border-top:1px solid rgba(255,255,255,.06);
      font-size:13px;
      line-height:1.25;
    }
    .resultBtn:first-child{ border-top:0; }
    .resultBtn:hover{ background:rgba(255,255,255,.06); }
    .subline{ display:block; margin-top:4px; color:rgba(168,179,207,.95); font-size:12px; }

    .addHereBox{
      display:none;
      border-radius: var(--r16);
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.22);
      padding:12px;
    }
    .addHereTitle{ font-size:12px; color:var(--muted); margin-bottom:6px; }
    .addHereAddr{ font-size:13px; opacity:.92; line-height:1.3; margin-bottom:10px; }

    #map{ width:100%; height:100vh; }

    .leaflet-popup-content-wrapper, .leaflet-popup-tip{
      background:#0f1730;
      color:var(--txt);
      border:1px solid rgba(255,255,255,.10);
    }
    .leaflet-popup-content{ margin:10px 12px; }
    .popupTitle{ font-weight:900; margin-bottom:4px; }
    .popupAddr{ color:rgba(168,179,207,.95); font-size:12px; margin-bottom:10px; }
    .pill{
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 8px; border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      font-size:12px; background:rgba(255,255,255,.04);
      margin-right:6px; margin-bottom:6px;
    }
    .popActions{ margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
    .popBtn{
      border:0; cursor:pointer; padding:9px 10px; border-radius: 12px;
      font-weight:900; background: rgba(255,255,255,.10); color: var(--txt);
    }
    .popBtn:hover{ background: rgba(255,255,255,.14); }

    @media (max-width: 980px){
      body{ overflow:auto; }
      .app{ grid-template-columns: 1fr; }
      #map{ height: 70vh; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>🎾 Padel Pole Watch</h1>
          <div class="tag">Carte communautaire des poteaux de padel</div>
        </div>
        <button class="btn secondary" id="btnRefresh" title="Recharger les données">↻</button>
      </div>

      <div class="card">
        <div class="row">
          <div style="font-weight:900;">📊 Statistiques</div>
          <div style="font-size:12px;color:var(--muted);" id="lastUpdate">—</div>
        </div>

        <div class="stats">
          <div class="statBox"><div class="label">Total (clubs)</div><div class="value" id="kpiTotal">0</div></div>
          <div class="statBox"><div class="label">🟢 Safe</div><div class="value" id="kpiGreen">0</div></div>
          <div class="statBox"><div class="label">🟠 Moyen</div><div class="value" id="kpiOrange">0</div></div>
          <div class="statBox"><div class="label">🔴 Dangereux</div><div class="value" id="kpiRed">0</div></div>
        </div>

        <div class="filters">
          <label class="check"><input type="checkbox" id="filterGreen" checked> Afficher 🟢 Safe</label>
          <label class="check"><input type="checkbox" id="filterOrange" checked> Afficher 🟠 Moyen</label>
          <label class="check"><input type="checkbox" id="filterRed" checked> Afficher 🔴 Dangereux</label>
          <label class="check" style="margin-top:6px;">
            <input type="checkbox" id="onlyHallOfShame">
            Mode “Hall of Shame” (🔴 uniquement + zoom)
          </label>
        </div>
      </div>

      <div class="card searchWrap">
        <div style="font-weight:900;">🔎 Trouver un club</div>
        <input class="searchInput" id="searchInput" type="search" placeholder="Nom du club + ville (ex: tennis club le pecq)" />
        <div class="hint">
          Astuce : zoome d’abord sur la ville ➜ la recherche est “biasée” dans la zone affichée (résultats bien plus justes).
        </div>

        <div class="results" id="resultsBox"></div>

        <div class="addHereBox" id="addHereBox">
          <div class="addHereTitle">📍 Adresse sélectionnée</div>
          <div class="addHereAddr" id="addHereAddr">—</div>
          <button class="btn" id="btnAddHere">➕ Ajouter un poteau ici</button>
        </div>
      </div>
    </aside>

    <main><div id="map"></div></main>
  </div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const SHEET_TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_hj7_w7FAra9Ko-QV3XrOFChkNLfpGAACMs5Jlj-ljpPakGQrlQW3Jd-zvq8mCJ3vEqz6Cva4oLQ5/pub?output=tsv";

    const GOOGLE_FORM_BASE =
      "https://docs.google.com/forms/d/e/1FAIpQLScvtTYbWyZKuAvAhX1Xhl2eM-WEaRci7QqB7MvXIN-BdwYciQ/viewform?usp=pp_url";

    // Form field IDs
    const FORM_CLUB = "entry.1761113382";
    const FORM_ADDRESS = "entry.1236097005";
    const FORM_LAT = "entry.2100892865";
    const FORM_LON = "entry.1484112050";

    const NOMINATIM_BASE = "https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=8&q=";

    // Dedup settings
    const DEDUP_DECIMALS = 4;

    // =========================
    // MAP
    // =========================
    const map = L.map("map", { worldCopyJump: true }).setView([46.6, 2.4], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "&copy; OpenStreetMap" }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    let points = [];
    let markerRefs = [];

    // =========================
    // UI refs
    // =========================
    const filterGreen = document.getElementById("filterGreen");
    const filterOrange = document.getElementById("filterOrange");
    const filterRed = document.getElementById("filterRed");
    const onlyHallOfShame = document.getElementById("onlyHallOfShame");

    const kpiTotal = document.getElementById("kpiTotal");
    const kpiGreen = document.getElementById("kpiGreen");
    const kpiOrange = document.getElementById("kpiOrange");
    const kpiRed = document.getElementById("kpiRed");
    const lastUpdate = document.getElementById("lastUpdate");

    const btnRefresh = document.getElementById("btnRefresh");

    const searchInput = document.getElementById("searchInput");
    const resultsBox = document.getElementById("resultsBox");
    const addHereBox = document.getElementById("addHereBox");
    const addHereAddr = document.getElementById("addHereAddr");
    const btnAddHere = document.getElementById("btnAddHere");

    let selectedPlace = null;

    // =========================
    // Helpers
    // =========================
    function nowLabel() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2,"0");
      return `${pad(d.getDate())}/${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function colorHex(color){
      if (color === "green") return cssVar("--green");
      if (color === "orange") return cssVar("--orange");
      return cssVar("--red");
    }
    function dangerToColor(dangerText){
      const t = (dangerText || "");
      if (t.includes("🟢")) return "green";
      if (t.includes("🟠")) return "orange";
      return "red";
    }
    function severityRank(color){
      if (color === "red") return 3;
      if (color === "orange") return 2;
      return 1;
    }
    function normalizeName(s){
      return (s || "")
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-z0-9]+/g," ")
        .trim();
    }
    function roundCoord(n){
      const f = Math.pow(10, DEDUP_DECIMALS);
      return Math.round(n * f) / f;
    }
    function dedupKey(club, lat, lon){
      return `${normalizeName(club)}::${roundCoord(lat)}::${roundCoord(lon)}`;
    }
    function passesColorFilters(color){
      if (onlyHallOfShame.checked) return color === "red";
      if (color === "green" && !filterGreen.checked) return false;
      if (color === "orange" && !filterOrange.checked) return false;
      if (color === "red" && !filterRed.checked) return false;
      return true;
    }
    function zoomToVisibleMarkers(){
      if (markerRefs.length === 0) return;
      const bounds = L.latLngBounds(markerRefs.map(m => m.getLatLng()));
      map.fitBounds(bounds.pad(0.25));
    }

    async function copyText(text){
      try{ await navigator.clipboard.writeText(text); return true; }
      catch(e){
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try{ document.execCommand("copy"); }catch(_){}
        document.body.removeChild(ta);
        return true;
      }
    }
    function buildShareUrl(lat, lon, zoom){
      const base = window.location.origin + window.location.pathname;
      const z = Math.max(3, Math.min(19, zoom || 16));
      return `${base}#z=${z}&lat=${lat.toFixed(6)}&lon=${lon.toFixed(6)}`;
    }

    function popupHTML(p){
      const pill =
        p.color === "green" ? `<span class="pill">🟢 Safe</span>` :
        p.color === "orange" ? `<span class="pill">🟠 Moyen</span>` :
        `<span class="pill">🔴 Dangereux</span>`;

      const reports = p.reportsCount > 1 ? `<span class="pill">📌 ${p.reportsCount} signalements</span>` : "";

      return `
        <div class="popupTitle">${p.club || "Club"}</div>
        <div class="popupAddr">${p.address || ""}</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${pill}${reports}
        </div>
        <div class="popActions">
          <button class="popBtn" data-action="share">🔗 Copier lien</button>
          <button class="popBtn" data-action="zoom">🎯 Zoom</button>
        </div>
      `;
    }

    function updateKPIs(){
      kpiTotal.textContent = points.length;
      kpiGreen.textContent = points.filter(p => p.color === "green").length;
      kpiOrange.textContent = points.filter(p => p.color === "orange").length;
      kpiRed.textContent = points.filter(p => p.color === "red").length;
    }

    function renderMarkers({autoZoomOnHall=false} = {}){
      markerLayer.clearLayers();
      markerRefs = [];

      for (const p of points){
        if (!passesColorFilters(p.color)) continue;

        const hex = colorHex(p.color);

        const m = L.circleMarker([p.lat, p.lon], {
          radius: 10, weight: 2,
          color: hex, fillColor: hex, fillOpacity: 0.85
        });

        m.on("popupopen", (e) => {
          const el = e.popup.getElement();
          if (!el) return;
          el.querySelectorAll("button[data-action]").forEach(btn => {
            btn.addEventListener("click", async () => {
              const act = btn.getAttribute("data-action");
              if (act === "zoom") map.setView([p.lat, p.lon], 17);
              if (act === "share") {
                const url = buildShareUrl(p.lat, p.lon, map.getZoom());
                await copyText(url);
                btn.textContent = "✅ Lien copié";
                setTimeout(()=> btn.textContent = "🔗 Copier lien", 1200);
              }
            });
          });
        });

        m.bindPopup(popupHTML(p), { maxWidth: 340 });
        m.addTo(markerLayer);
        markerRefs.push(m);
      }

      updateKPIs();
      if (autoZoomOnHall && onlyHallOfShame.checked) zoomToVisibleMarkers();
    }

    // =========================
    // Load sheet TSV + dedup
    // =========================
    async function loadSheet(){
      const res = await fetch(SHEET_TSV_URL, { cache:"no-store" });
      const text = await res.text();

      const rows = text.trim().split("\n");
      rows.shift(); // header

      const buckets = new Map();

      for (const row of rows){
        const cols = row.split("\t");
        if (cols.length < 7) continue;

        const club = cols[1] || "";
        const address = cols[2] || "";
        const lat = Number(cols[3]);
        const lon = Number(cols[4]);
        const danger = cols[6] || "";
        const color = dangerToColor(danger);

        if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;

        const key = dedupKey(club, lat, lon);

        if (!buckets.has(key)){
          buckets.set(key, {
            club, address, lat, lon, danger, color,
            reportsCount: 1,
            maxSeverity: severityRank(color)
          });
        } else {
          const b = buckets.get(key);
          b.reportsCount += 1;
          const sev = severityRank(color);
          if (sev > b.maxSeverity){
            b.maxSeverity = sev;
            b.color = color;
            b.danger = danger;
          }
          if ((address || "").length > (b.address || "").length) b.address = address;
        }
      }

      points = [...buckets.values()];
      lastUpdate.textContent = nowLabel();
      renderMarkers();
    }

    // =========================
    // SEARCH (like the "perfect" version)
    // Key points:
    // - query is EXACTLY what user typed (no padel boost)
    // - bias search to current map bounds when zoomed enough
    // - show multiple results for user to pick the right one
    // =========================
    function hideResults(){
      resultsBox.style.display = "none";
      resultsBox.innerHTML = "";
    }

    function buildNominatimUrl(q){
      let url = NOMINATIM_BASE + encodeURIComponent(q);

      // Bias by map bounds when zoomed in (makes results MUCH more relevant)
      const z = map.getZoom();
      if (z >= 10){
        const b = map.getBounds();
        // Nominatim expects: viewbox=left,top,right,bottom
        const left = b.getWest();
        const right = b.getEast();
        const top = b.getNorth();
        const bottom = b.getSouth();
        url += `&viewbox=${left},${top},${right},${bottom}&bounded=1`;
      }
      return url;
    }

    function showResults(items, q){
      resultsBox.innerHTML = "";
      resultsBox.style.display = "block";

      if (!items.length){
        resultsBox.innerHTML = `<div style="padding:10px 10px; font-size:13px; color:var(--muted);">Aucun résultat. Astuce : zoome sur la ville puis relance la recherche.</div>`;
        return;
      }

      // Light ranking: prefer results whose display_name contains the query tokens
      const tokens = (q || "").toLowerCase().split(/\s+/).filter(Boolean);
      const scored = items.map(it => {
        const name = (it.display_name || "").toLowerCase();
        let score = 0;
        for (const t of tokens) if (name.includes(t)) score += 2;
        // prefer "amenity/leisure" for clubs but without filtering out others
        const cls = (it.class || "").toLowerCase();
        if (cls.includes("amenity") || cls.includes("leisure")) score += 1;
        return { it, score };
      }).sort((a,b)=> b.score - a.score);

      for (const {it} of scored){
        const label = it.display_name || "";
        const type = [it.class, it.type].filter(Boolean).join(" • ");
        const btn = document.createElement("button");
        btn.className = "resultBtn";
        btn.type = "button";
        btn.innerHTML = `${label}<span class="subline">${type}</span>`;

        btn.addEventListener("click", () => {
          const lat = Number(it.lat);
          const lon = Number(it.lon);

          if (Number.isFinite(lat) && Number.isFinite(lon)){
            map.setView([lat, lon], 16);
          }

          selectedPlace = { label, lat, lon };
          addHereAddr.textContent = label;
          addHereBox.style.display = "block";
          hideResults();
        });

        resultsBox.appendChild(btn);
      }
    }

    async function runSearch(q){
      if (!q || q.trim().length < 3){
        hideResults();
        return;
      }

      resultsBox.style.display = "block";
      resultsBox.innerHTML = `<div style="padding:10px 10px; font-size:13px; color:var(--muted);">Recherche…</div>`;

      try{
        const res = await fetch(buildNominatimUrl(q.trim()), { cache:"no-store" });
        const data = await res.json();
        showResults(Array.isArray(data) ? data : [], q.trim());
      }catch(e){
        resultsBox.style.display = "block";
        resultsBox.innerHTML = `<div style="padding:10px 10px; font-size:13px; color:var(--muted);">Erreur de recherche. Réessaie.</div>`;
        console.error(e);
      }
    }

    let searchTimer = null;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => runSearch(searchInput.value), 300);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        clearTimeout(searchTimer);
        runSearch(searchInput.value);
      }
    });

    // Add here button -> open Google Form with prefill
    btnAddHere.addEventListener("click", () => {
      if (!selectedPlace) return;

      const clubName = (selectedPlace.label.split(",")[0] || selectedPlace.label).trim();
      const lat = Number(selectedPlace.lat);
      const lon = Number(selectedPlace.lon);

      const url =
        `${GOOGLE_FORM_BASE}` +
        `&entry.1761113382=${encodeURIComponent(clubName)}` +
        `&entry.1236097005=${encodeURIComponent(selectedPlace.label)}` +
        `&entry.2100892865=${encodeURIComponent(lat.toFixed(7))}` +
        `&entry.1484112050=${encodeURIComponent(lon.toFixed(7))}`;

      window.open(url, "_blank");
    });

    // Filters
    filterGreen.addEventListener("change", () => renderMarkers());
    filterOrange.addEventListener("change", () => renderMarkers());
    filterRed.addEventListener("change", () => renderMarkers());
    onlyHallOfShame.addEventListener("change", () => renderMarkers({autoZoomOnHall:true}));

    // Refresh
    btnRefresh.addEventListener("click", () => loadSheet().catch(console.error));

    // Deep link from URL hash
    function applyHash(){
      const h = (window.location.hash || "").replace(/^#/, "");
      if (!h) return;
      const params = new URLSearchParams(h);
      const z = Number(params.get("z"));
      const lat = Number(params.get("lat"));
      const lon = Number(params.get("lon"));
      if (Number.isFinite(z) && Number.isFinite(lat) && Number.isFinite(lon)){
        map.setView([lat, lon], z);
      }
    }
    window.addEventListener("hashchange", applyHash);

    // Init
    applyHash();
    loadSheet().catch(console.error);
    setInterval(() => loadSheet().catch(()=>{}), 120000);
  </script>
</body>
</html>
